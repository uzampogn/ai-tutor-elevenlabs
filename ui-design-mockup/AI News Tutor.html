<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI News Tutor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ── tokens ─────────────────────────────────────────────────────────── */
:root {
  --accent: #c75b39;
  --answer-font: 'Newsreader', Georgia, serif;

  --bg:        oklch(0.991 0.006 252);
  --panel:     oklch(0.996 0.004 252);
  --panel-2:   oklch(0.968 0.009 252);
  --ink:       oklch(0.255 0.014 260);
  --ink-soft:  oklch(0.44 0.014 260);
  --muted:     oklch(0.60 0.012 260);
  --faint:     oklch(0.72 0.010 260);
  --line:      oklch(0.90 0.010 255);
  --line-2:    oklch(0.945 0.007 255);

  --sans: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;

  --r-sm: 8px; --r: 12px; --r-lg: 16px; --r-xl: 22px;
  --shadow-sm: 0 1px 2px oklch(0.4 0.02 60 / 0.06), 0 1px 3px oklch(0.4 0.02 60 / 0.05);
  --shadow:    0 4px 16px oklch(0.4 0.02 60 / 0.08), 0 1px 3px oklch(0.4 0.02 60 / 0.05);
  --shadow-lg: 0 18px 50px oklch(0.35 0.02 60 / 0.16);

  --gap: 24px;       /* density-controlled */
  --bubble-pad: 18px;
}
.density-compact { --gap: 16px; --bubble-pad: 14px; }
.density-comfy   { --gap: 34px; --bubble-pad: 22px; }

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
#root { height: 100%; }
button { font-family: inherit; cursor: pointer; }
::selection { background: color-mix(in oklab, var(--accent) 22%, transparent); }

/* ── shell ──────────────────────────────────────────────────────────── */
.app {
  height: 100%;
  display: grid;
  grid-template-columns: 320px 1fr;
  background:
    radial-gradient(120% 80% at 100% 0%, color-mix(in oklab, var(--accent) 5%, transparent), transparent 60%),
    var(--bg);
}

/* ── sidebar ────────────────────────────────────────────────────────── */
.sidebar {
  border-right: 1px solid var(--line);
  background: var(--panel-2);
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.brand {
  display: flex; align-items: center; gap: 12px;
  padding: 22px 22px 18px;
}
.brand-mark {
  width: 38px; height: 38px; border-radius: 11px;
  background: linear-gradient(150deg, var(--ink), oklch(0.34 0.02 60));
  display: grid; place-items: center; flex: none;
  position: relative; overflow: hidden;
}
.brand-pulse {
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 70%, transparent);
  animation: pulse 2.6s ease-out infinite;
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 55%, transparent); }
  70%  { box-shadow: 0 0 0 9px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}
.brand-name { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
.brand-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }

.kb-head { padding: 6px 22px 14px; border-bottom: 1px solid var(--line-2); }
.kb-title {
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  color: var(--ink-soft);
}
.kb-refresh {
  border: 1px solid var(--line); background: var(--panel);
  width: 26px; height: 26px; border-radius: 7px;
  display: grid; place-items: center; color: var(--muted);
  transition: .18s;
}
.kb-refresh:hover { color: var(--ink); border-color: var(--faint); }
.kb-refresh.spinning svg { animation: spin .9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.kb-meta { display: flex; align-items: center; gap: 10px; margin-top: 9px; }
.kb-live {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600; color: oklch(0.55 0.13 150);
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: oklch(0.66 0.16 150);
  box-shadow: 0 0 0 0 oklch(0.66 0.16 150 / .6);
  animation: pulse-green 2s infinite;
}
@keyframes pulse-green {
  0% { box-shadow: 0 0 0 0 oklch(0.66 0.16 150 / .5); }
  70% { box-shadow: 0 0 0 6px transparent; }
  100% { box-shadow: 0 0 0 0 transparent; }
}
.kb-mono { font-family: var(--mono); font-size: 10.5px; color: var(--faint); }

.kb-list { overflow-y: auto; padding: 12px; flex: 1; min-height: 0; }
.kb-list-label {
  font-family: var(--mono); font-size: 10px; color: var(--faint);
  text-transform: uppercase; letter-spacing: .06em; padding: 4px 8px 10px;
}
.kb-card {
  display: block; width: 100%; text-align: left;
  border: 1px solid transparent; background: transparent;
  border-radius: var(--r); padding: 11px 12px; margin-bottom: 2px;
  transition: .15s;
}
.kb-card:hover { background: var(--panel); border-color: var(--line); }
.kb-card.is-active {
  background: var(--panel);
  border-color: color-mix(in oklab, var(--accent) 35%, var(--line));
  box-shadow: var(--shadow-sm);
}
.kb-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.kb-cat {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10.5px; font-weight: 600; color: var(--c, var(--muted));
  letter-spacing: .02em;
}
.kb-cat-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--c, var(--muted)); }
.kb-date { font-family: var(--mono); font-size: 10px; color: var(--faint); }
.kb-card-title {
  font-size: 13px; line-height: 1.34; font-weight: 500; color: var(--ink);
  letter-spacing: -0.005em;
}

/* ── main column ────────────────────────────────────────────────────── */
.main { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px; border-bottom: 1px solid var(--line);
  background: color-mix(in oklab, var(--panel) 80%, transparent);
  backdrop-filter: blur(8px);
}
.topbar-title {
  font-family: var(--answer-font); font-weight: 500; font-size: 19px;
  margin: 0; letter-spacing: -0.01em;
}
.topbar-sub { font-size: 12px; color: var(--muted); }
.topbar-l { display: flex; align-items: baseline; gap: 12px; }
.topbar-r { display: flex; align-items: center; gap: 10px; }

.voice-toggle {
  display: inline-flex; align-items: center; gap: 9px;
  border: 1px solid var(--line); background: var(--panel);
  color: var(--muted); font-weight: 600; font-size: 12.5px;
  padding: 8px 14px 8px 11px; border-radius: 999px; transition: .18s;
}
.voice-toggle:hover { border-color: var(--faint); }
.voice-toggle.on {
  color: var(--accent);
  border-color: color-mix(in oklab, var(--accent) 40%, transparent);
  background: color-mix(in oklab, var(--accent) 8%, var(--panel));
}
.vt-icon { display: inline-flex; height: 14px; align-items: center; }

.newchat {
  border: 1px solid transparent; background: var(--ink); color: var(--bg);
  font-weight: 600; font-size: 12.5px; padding: 8px 15px; border-radius: 999px;
  transition: .18s;
}
.newchat:hover { background: oklch(0.34 0.02 60); }

/* ── scroll thread ──────────────────────────────────────────────────── */
.scroll { flex: 1; overflow-y: auto; min-height: 0; }
.thread { max-width: 760px; margin: 0 auto; padding: 34px 32px 28px; }

.row { display: flex; margin-bottom: var(--gap); }
.row-user { justify-content: flex-end; }
.bubble-user {
  background: var(--ink); color: var(--bg);
  padding: 12px 17px; border-radius: 18px 18px 5px 18px;
  max-width: 78%; font-size: 14.5px; line-height: 1.5; font-weight: 450;
  box-shadow: var(--shadow-sm);
}
.row-ai { gap: 14px; align-items: flex-start; }
.ai-avatar {
  width: 32px; height: 32px; border-radius: 9px; flex: none; margin-top: 2px;
  background: linear-gradient(150deg, color-mix(in oklab, var(--accent) 88%, white), var(--accent));
  display: grid; place-items: center;
  box-shadow: 0 2px 8px color-mix(in oklab, var(--accent) 30%, transparent);
}
.ai-spark {
  width: 13px; height: 13px;
  background: white;
  clip-path: polygon(50% 0, 61% 39%, 100% 50%, 61% 61%, 50% 100%, 39% 61%, 0 50%, 39% 39%);
}
.ai-body { flex: 1; min-width: 0; padding-top: 2px; }

.ai-status {
  display: inline-flex; align-items: center; gap: 11px;
  margin-bottom: 12px; height: 20px;
}
.status-label {
  font-family: var(--mono); font-size: 11px; color: var(--accent);
  letter-spacing: .02em;
}
.thinking-dots { display: inline-flex; gap: 4px; align-items: center; }
.thinking-dots i {
  width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  opacity: .35; animation: blink 1.2s infinite;
}
.thinking-dots i:nth-child(2) { animation-delay: .2s; }
.thinking-dots i:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,100% { opacity: .25; } 50% { opacity: 1; } }

.ai-para {
  font-family: var(--answer-font); font-size: 17px; line-height: 1.62;
  color: var(--ink); margin: 0 0 14px; letter-spacing: -0.003em;
  text-wrap: pretty;
}
.ai-para strong { font-weight: 600; color: var(--ink); }
.ai-para em { font-style: italic; }
.caret {
  display: inline-block; width: 2px; height: 1.05em; vertical-align: -0.18em;
  background: var(--accent); margin-left: 2px; animation: caret 1s step-end infinite;
}
@keyframes caret { 50% { opacity: 0; } }

/* business impact card */
.impact {
  margin: 18px 0 6px; padding: 16px 18px;
  border-radius: var(--r-lg);
  background:
    linear-gradient(180deg, color-mix(in oklab, var(--accent) 9%, var(--panel)), color-mix(in oklab, var(--accent) 5%, var(--panel)));
  border: 1px solid color-mix(in oklab, var(--accent) 24%, transparent);
  position: relative;
}
.impact::before {
  content: ""; position: absolute; left: 0; top: 14px; bottom: 14px; width: 3px;
  border-radius: 3px; background: var(--accent);
}
.impact-label {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 9px; white-space: nowrap;
}
.impact-text {
  margin: 0; font-size: 14.5px; line-height: 1.6; color: var(--ink-soft);
  font-weight: 450; text-wrap: pretty;
}
.impact-text strong { color: var(--ink); font-weight: 650; }

/* sources */
.sources { margin-top: 16px; }
.sources-label {
  font-family: var(--mono); font-size: 10px; letter-spacing: .08em;
  text-transform: uppercase; color: var(--faint); margin-bottom: 8px;
}
.sources-row { display: flex; flex-wrap: wrap; gap: 8px; }
.source-chip {
  display: inline-flex; align-items: center; gap: 7px; max-width: 320px;
  border: 1px solid var(--line); background: var(--panel);
  border-radius: 999px; padding: 6px 13px 6px 11px;
  font-size: 12px; color: var(--ink-soft); font-weight: 500;
  transition: .15s;
}
.source-chip:hover {
  border-color: color-mix(in oklab, var(--accent) 40%, transparent);
  color: var(--accent); box-shadow: var(--shadow-sm);
}
.source-chip svg { flex: none; opacity: .7; }
.source-chip-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.msg-actions { display: flex; gap: 6px; margin-top: 14px; }
.act {
  display: inline-flex; align-items: center; gap: 6px;
  border: 1px solid transparent; background: transparent; color: var(--muted);
  font-size: 12px; font-weight: 600; padding: 6px 11px; border-radius: 8px;
  transition: .15s;
}
.act:hover { background: var(--panel-2); color: var(--ink); border-color: var(--line); }
.act.is-on { color: var(--accent); background: color-mix(in oklab, var(--accent) 9%, transparent); }

/* ── waveform ───────────────────────────────────────────────────────── */
.wave { display: inline-flex; align-items: center; gap: 2px; height: 18px; }
.wave span {
  width: 2.5px; border-radius: 2px; height: 3px;
  background: currentColor; opacity: .55;
}
.wave.is-active span {
  animation: wv 0.9s ease-in-out infinite;
  animation-delay: calc(var(--i) * -0.07s);
  background: var(--accent); opacity: .85;
}
@keyframes wv {
  0%, 100% { height: 3px; }
  50% { height: 16px; }
}
.voice-toggle .wave span { background: currentColor; }
.voice-toggle.on .wave.is-active span { background: var(--accent); }

/* ── welcome ────────────────────────────────────────────────────────── */
.welcome { padding: 30px 4px 10px; }
.welcome-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11.5px; font-weight: 600; color: oklch(0.5 0.12 150);
  background: oklch(0.96 0.03 150); border: 1px solid oklch(0.88 0.05 150);
  padding: 6px 13px; border-radius: 999px; margin-bottom: 22px;
}
.welcome-title {
  font-family: var(--answer-font); font-weight: 400; font-size: 38px;
  line-height: 1.14; letter-spacing: -0.02em; margin: 0 0 18px;
  color: var(--ink); max-width: 22ch;
}
.welcome-title em { font-style: italic; color: var(--accent); }
.welcome-lede {
  font-size: 15.5px; line-height: 1.6; color: var(--ink-soft);
  max-width: 56ch; margin: 0 0 30px; text-wrap: pretty;
}
.welcome-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 620px;
}
.welcome-chip {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  border: 1px solid var(--line); background: var(--panel);
  border-radius: var(--r-lg); padding: 16px 16px 16px 18px; text-align: left;
  transition: .18s; box-shadow: var(--shadow-sm);
}
.welcome-chip:hover {
  border-color: color-mix(in oklab, var(--accent) 40%, transparent);
  transform: translateY(-2px); box-shadow: var(--shadow);
}
.wc-q { font-size: 14.5px; font-weight: 500; color: var(--ink); line-height: 1.4; }
.wc-arrow {
  flex: none; width: 30px; height: 30px; border-radius: 9px;
  display: grid; place-items: center; color: var(--accent);
  background: color-mix(in oklab, var(--accent) 11%, transparent);
  transition: .18s;
}
.welcome-chip:hover .wc-arrow { background: var(--accent); color: white; }

/* ── composer ───────────────────────────────────────────────────────── */
.composer-wrap {
  padding: 12px 32px 18px; border-top: 1px solid var(--line);
  background: color-mix(in oklab, var(--panel) 70%, transparent);
}
.quick-row {
  display: flex; gap: 8px; max-width: 760px; margin: 0 auto 12px;
  flex-wrap: wrap;
}
.quick-chip {
  border: 1px solid var(--line); background: var(--panel);
  border-radius: 999px; padding: 7px 14px; font-size: 12.5px; font-weight: 500;
  color: var(--ink-soft); transition: .15s;
}
.quick-chip:hover:not(:disabled) {
  border-color: color-mix(in oklab, var(--accent) 40%, transparent);
  color: var(--accent);
}
.quick-chip:disabled { opacity: .45; cursor: default; }

.composer {
  max-width: 760px; margin: 0 auto;
  display: flex; align-items: flex-end; gap: 8px;
  background: var(--panel); border: 1px solid var(--line);
  border-radius: var(--r-xl); padding: 8px 8px 8px 8px;
  box-shadow: var(--shadow);
  transition: border-color .18s, box-shadow .18s;
}
.composer:focus-within {
  border-color: color-mix(in oklab, var(--accent) 45%, transparent);
  box-shadow: var(--shadow), 0 0 0 4px color-mix(in oklab, var(--accent) 10%, transparent);
}
.mic-btn, .send-btn {
  flex: none; width: 40px; height: 40px; border-radius: 13px;
  display: grid; place-items: center; transition: .16s;
}
.mic-btn { background: transparent; border: 1px solid var(--line); color: var(--muted); }
.mic-btn:hover { color: var(--ink); border-color: var(--faint); }
.send-btn { background: var(--accent); border: none; color: white; }
.send-btn:hover:not(:disabled) { filter: brightness(1.06); transform: translateY(-1px); }
.send-btn:disabled { opacity: .4; cursor: default; }
.composer-ta {
  flex: 1; border: none; outline: none; resize: none; background: transparent;
  font-family: var(--sans); font-size: 14.5px; line-height: 1.5; color: var(--ink);
  padding: 10px 4px; max-height: 160px;
}
.composer-ta::placeholder { color: var(--faint); }
.composer-foot {
  max-width: 760px; margin: 10px auto 0; text-align: center;
  font-size: 11px; color: var(--faint);
}

/* ── article drawer ─────────────────────────────────────────────────── */
.drawer {
  position: fixed; top: 0; right: 0; height: 100%; width: 400px;
  background: var(--panel); border-left: 1px solid var(--line);
  box-shadow: var(--shadow-lg);
  transform: translateX(100%); transition: transform .32s cubic-bezier(.4,0,.2,1);
  z-index: 40; overflow-y: auto;
}
.drawer.open { transform: translateX(0); }
.drawer-inner { padding: 24px 26px 40px; }
.drawer-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.drawer-close {
  border: 1px solid var(--line); background: var(--panel-2); color: var(--muted);
  width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center;
  transition: .15s;
}
.drawer-close:hover { color: var(--ink); border-color: var(--faint); }
.drawer-date { font-family: var(--mono); font-size: 11px; color: var(--faint); margin-bottom: 8px; }
.drawer-title {
  font-family: var(--answer-font); font-weight: 500; font-size: 25px;
  line-height: 1.22; letter-spacing: -0.015em; margin: 0 0 18px; color: var(--ink);
}
.drawer-hero {
  height: 150px; border-radius: var(--r); margin-bottom: 18px;
  background-color: var(--panel-2);
  background-image: repeating-linear-gradient(
    -45deg, var(--line-2) 0 12px, transparent 12px 24px);
  border: 1px solid var(--line);
  display: grid; place-items: center;
}
.ph-label {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  background: var(--panel); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--line);
}
.drawer-summary { font-size: 15px; line-height: 1.62; color: var(--ink-soft); margin: 0 0 18px; text-wrap: pretty; }
.drawer-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 22px; }
.tag {
  font-family: var(--mono); font-size: 11px; color: var(--muted);
  background: var(--panel-2); border: 1px solid var(--line);
  padding: 4px 9px; border-radius: 6px;
}
.drawer-note {
  font-size: 12.5px; line-height: 1.55; color: var(--muted);
  padding: 13px 15px; border-radius: var(--r);
  background: var(--panel-2); border: 1px dashed var(--line);
}

/* ── scrollbars ─────────────────────────────────────────────────────── */
.kb-list::-webkit-scrollbar, .scroll::-webkit-scrollbar, .drawer::-webkit-scrollbar { width: 10px; }
.kb-list::-webkit-scrollbar-thumb, .scroll::-webkit-scrollbar-thumb, .drawer::-webkit-scrollbar-thumb {
  background: var(--line); border-radius: 99px; border: 3px solid var(--panel-2);
}
.scroll::-webkit-scrollbar-thumb { border-color: var(--bg); }

/* ── responsive ─────────────────────────────────────────────────────── */
@media (max-width: 880px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .thread, .composer, .quick-row, .composer-foot { max-width: 100%; }
  .welcome-grid { grid-template-columns: 1fr; }
  .welcome-title { font-size: 30px; }
  .drawer { width: 100%; }
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
